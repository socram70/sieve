name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version ${{ github.ref_name }} --no-git-tag-version

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Package Windows (x64)
        run: npx gulp app:zip-win32

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sieve-win32-x64
          path: build/*.zip


  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version ${{ github.ref_name }} --no-git-tag-version

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Package Linux (x64) – zip
        run: npx gulp app:zip-linux

      - name: Install libfuse2 (required for AppImage)
        run: sudo apt-get install -y libfuse2

      - name: Package Linux (x64) – AppImage
        run: npx gulp app:appimage-linux

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: sieve-linux-x64-zip
          path: build/*.zip

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: sieve-linux-x64-appimage
          path: build/*.AppImage


  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version ${{ github.ref_name }} --no-git-tag-version

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Package macOS (x64)
        run: npx gulp app:zip-macos

      - name: Package macOS (arm64)
        run: npx gulp app:zip-macos-arm64

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: sieve-macos-x64
          path: build/*-darwin-x64.zip

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: sieve-macos-arm64
          path: build/*-darwin-arm64.zip


  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
